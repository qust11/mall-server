server:
  port: 8093
spring:
  application:
    name: product-service
  config:
    import:
      - nacos:mall-product?group=DEFAULT_GROUP
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      config:
        namespace: 5cfb9e33-bd54-4203-989b-a09c9e604a25
        access-key: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
        password: nacos
        enabled: true
        username: nacos
        file-extension: YAML
        enable-remote-sync-config: true
      discovery:
        access-key: VGhpc0lzTXlDdXN0b21TZWNyZXRLZXkwMTIzNDU2Nzg=
        namespace: 5cfb9e33-bd54-4203-989b-a09c9e604a25
    feign:
      servlet:
        enabled: true
logging:
  level:
    # 打印底层 HTTP 请求和响应（会包含完整的 DSL 语句）[reference:0][reference:1]
    org.springframework.data.elasticsearch.client.WIRE: TRACE
    # 或者更通用的 tracer 日志[reference:2]
    tracer: TRACE